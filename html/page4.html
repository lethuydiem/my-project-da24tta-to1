<!DOCTYPE html>
<html lang="vi">
	<head>
		<meta charset = "UTF-8">
		<title>Hóa đơn thanh toán</title>
		<link rel="stylesheet" href="../css/style4.css">
	</head>
	<body>
		<h1>Hóa đơn thanh toán</h1>
		<table>
			<tr>
				<th>STT</th>
				<th>Tên sản phẩm</th>
				<th>Số lượng</th>
				<th>Đơn giá</th>
				<th>Thành tiền</th>
			</tr>
			<tr>
				<td>1</td>
				<td>Sản phẩm A</td>
				<td class="sl">3</td>
				<td class="dg">1000</td>
				<td class="tt">0</td>
			</tr>
			<tr>
				<td>2</td>
				<td>Sản phẩm B</td>
				<td class="sl">4</td>
				<td class="dg">2000</td>
				<td class="tt">0</td>
			</tr>
			<tr>
				<td>3</td>
				<td>Sản phẩm C</td>
				<td class="sl">5</td>
				<td class="dg">4000</td>
				<td class="tt">0</td>
			</tr>
			<tr>
				<td>4</td>
				<td>Sản phẩm D</td>
				<td class="sl">2</td>
				<td class="dg">5000</td>
				<td class="tt">0</td>
			</tr>
			<tr>
				<td colspan="3">Tổng thanh toán</td>
				<td colspan="2" id="tong">0</td>
			</tr>
		</table>
		<script>
			const donGia = document.getElementsByClassName("dg");
			const soLuong = document.getElementsByClassName("sl");
			const thanhTien = document.getElementsByClassName("tt");
			let tong = 0;
			for(let i=0; i<donGia.length; i++){
				thanhTien[i].innerHTML = parseInt(donGia[i].innerHTML * parseInt(soLuong[i].innerHTML));
				tong += parseInt(thanhTien[i].innerHTML);
			}
			document.getElementById("tong").innerHTML = tong;
		</script>
	</body>
</html>
