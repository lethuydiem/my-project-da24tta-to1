<!DOCTYPE html>
<html lang ="vi">
	<head>
		<title>Thiết Kế From Đăng Nhập</title>
		<meta charset= "utf-8">
		<link rel="stylesheet" href ="../css/style2.css">
	</head>
	<body>
		<div class ="container">
			<form id="frmLogin">
				<h3 id="title">Đăng Nhập Hệ Thống</h3>
				<div class="form-group">
					<center>
					<label for ="txtUsername">Tên đăng nhập</label>
					<input class ="form-control" type ="text" id="txtUsername" name="txtUsername"></input>
					</center>
				</div>
				<div class ="form-group">
					<center>
					<label for ="txtPassword">Mật khẩu</label>
					<input class ="form-control" type ="Password" id="txtPassword" name="txtPassword"></input>
					</center>
				</div>
				<center>
				<input class="button" type="submit" id="sblogin" name="sblogin" value="Đăng nhập"></input>
				<input class="button" type="reset" id="rsCancel" name="rsCancel" value="Nhập lại"></input>
				</center>
			</form>
		</div>
	</body>
</html>
