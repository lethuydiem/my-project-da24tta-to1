<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm hoa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style7.css">
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center mb-4">Quản lý sản phẩm hoa</h2>
        
        <div class="mb-4 text-end">
            <button class="btn btn-primary" onclick="openAddModal()">+ Thêm sản phẩm mới</button>
        </div>

        <!-- Nơi hiển thị danh sách hoa -->
        <div id="product-list" class="row"></div>
    </div>

    <!-- Modal Thêm/Sửa -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="edit-id">
                        <div class="mb-3">
                            <label class="form-label">Tên sản phẩm</label>
                            <input type="text" class="form-control" id="p-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giá (VND)</label>
                            <input type="number" class="form-control" id="p-price" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Link ảnh (../assets/images/filename.jpg)</label>
                            <input type="text" class="form-control" id="p-img">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" id="p-desc" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Xác nhận Lưu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/lib.js"></script>
</body>
</html>
